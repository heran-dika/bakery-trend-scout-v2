name: BakeryTrendScout Daily Run

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run pipeline
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      run: python main.py
    
    - name: Commit & push database
      run: |
        git config user.name "BakeryTrendScout Bot"
        git config user.email "bot@bakerytrendscout.local"
        git add trends.db
        if git diff --cached --quiet; then
          echo "Tidak ada perubahan trends.db, skip commit."
        else
          git commit -m "[auto] Daily run - $(date +%Y-%m-%d)"
          if git push; then
            echo "Push berhasil."
          else
            echo "::warning::git push GAGAL -- trends.db TIDAK ke-update di repo. Cek permission token Actions."
          fi
        fi
